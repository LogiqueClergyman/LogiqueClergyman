<svg width="100%" viewBox="0 0 800 280" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Aditya Vishwanathan Verma</title>
  <defs>
    <style>
      .f-sans { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .f-mono { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', monospace; }
    </style>
  </defs>

  <rect width="800" height="280" rx="12" fill="#161b22"/>
  <rect width="800" height="280" rx="12" fill="none" stroke="#30363d" stroke-width="1"/>

  <text x="36" y="52" class="f-sans" fill="#e6edf3" font-size="26" font-weight="600">hey, i'm aditya 👋</text>
  <text x="36" y="78" class="f-sans" fill="#8b949e" font-size="13">smart contracts · backend · systems that move value</text>
  <text x="36" y="96" class="f-sans" fill="#6e7681" font-size="12">building at the boundary of on-chain and off-chain systems</text>

  <rect x="36" y="110" width="182" height="22" rx="11" fill="#1a3a2a"/>
  <circle cx="52" cy="121" r="4" fill="#3fb950"/>
  <text x="63" y="125" class="f-sans" fill="#3fb950" font-size="11" font-weight="500">currently: uniswap hookathon</text>

  <line x1="36" y1="148" x2="764" y2="148" stroke="#30363d" stroke-width="0.5"/>

  <text x="36" y="168" class="f-mono" fill="#6e7681" font-size="10" letter-spacing="0.08em">WHAT I BUILD</text>

  <rect x="36" y="178" width="224" height="64" rx="8" fill="#1c2128" stroke="#30363d" stroke-width="0.5"/>
  <text x="52" y="198" class="f-sans" fill="#e6edf3" font-size="12" font-weight="500">smart contracts</text>
  <text x="52" y="215" class="f-sans" fill="#8b949e" font-size="11">solidity, move, hooks</text>
  <text x="52" y="230" class="f-sans" fill="#8b949e" font-size="11">protocol logic</text>

  <rect x="272" y="178" width="224" height="64" rx="8" fill="#1c2128" stroke="#30363d" stroke-width="0.5"/>
  <text x="288" y="198" class="f-sans" fill="#e6edf3" font-size="12" font-weight="500">relayer systems</text>
  <text x="288" y="215" class="f-sans" fill="#8b949e" font-size="11">off-chain execution</text>
  <text x="288" y="230" class="f-sans" fill="#8b949e" font-size="11">tx management, ordering</text>

  <rect x="508" y="178" width="224" height="64" rx="8" fill="#1c2128" stroke="#30363d" stroke-width="0.5"/>
  <text x="524" y="198" class="f-sans" fill="#e6edf3" font-size="12" font-weight="500">backend infra</text>
  <text x="524" y="215" class="f-sans" fill="#8b949e" font-size="11">node, postgres, docker</text>
  <text x="524" y="230" class="f-sans" fill="#8b949e" font-size="11">AWS, distributed systems</text>

  <line x1="36" y1="258" x2="764" y2="258" stroke="#30363d" stroke-width="0.5"/>
  <text x="400" y="272" class="f-sans" fill="#6e7681" font-size="11" text-anchor="middle" font-style="italic">most bugs i've fixed were never where we thought they'd be</text>
