<svg width="100%" viewBox="0 0 680 340" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Aditya Vishwanathan Verma — GitHub README hero</title>
  <desc>Hero banner: name, tagline, status, what I build, stack</desc>

  <defs>
    <style>
      .f-sans { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .f-mono { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', monospace; }
      .t-pri  { fill: #1a1a1a; }
      .t-sec  { fill: #555550; }
      .t-ter  { fill: #888780; }
      .bg-pri  { fill: #ffffff; }
      .bg-sec  { fill: #f5f4f0; }
      .str     { stroke: #e0ddd6; }
      .pill-bg { fill: #e1f5ee; }
      .pill-t  { fill: #0F6E56; }
      .tag-bg  { fill: #f5f4f0; }
      .tag-hi  { fill: #e6f1fb; }
      .tag-hi-t { fill: #185FA5; }
      @media (prefers-color-scheme: dark) {
        .t-pri  { fill: #e8e6df; }
        .t-sec  { fill: #a8a69f; }
        .t-ter  { fill: #6e6c66; }
        .bg-pri { fill: #1c1c1a; }
        .bg-sec { fill: #242422; }
        .str    { stroke: #3a3a38; }
        .pill-bg { fill: #1a3020; }
        .pill-t  { fill: #5DCAA5; }
        .tag-bg  { fill: #242422; }
        .tag-hi  { fill: #1a2535; }
        .tag-hi-t { fill: #85B7EB; }
      }
    </style>
  </defs>

  <rect width="680" height="340" rx="16" class="bg-pri str" stroke-width="0.5"/>

  <text x="32" y="48" class="f-sans t-pri" font-size="24" font-weight="500">hey, i'm aditya</text>
  <text x="32" y="72" class="f-sans t-sec" font-size="13">smart contracts · backend · systems that move value</text>
  <text x="32" y="90" class="f-sans t-ter" font-size="12">building at the boundary of on-chain and off-chain systems</text>

  <rect x="32" y="104" width="168" height="22" rx="11" class="pill-bg"/>
  <circle cx="48" cy="115" r="4" class="pill-t" opacity="0.9"/>
  <text x="58" y="119" class="f-sans pill-t" font-size="11" font-weight="500">currently: uniswap hookathon</text>

  <line x1="32" y1="140" x2="648" y2="140" class="str" stroke-width="0.5"/>

  <text x="32" y="162" class="f-mono t-ter" font-size="10" letter-spacing="0.08em">WHAT I BUILD</text>

  <rect x="32" y="172" width="185" height="60" rx="8" class="bg-sec str" stroke-width="0.5"/>
  <text x="44" y="191" class="f-sans t-pri" font-size="12" font-weight="500">smart contracts</text>
  <text x="44" y="207" class="f-sans t-sec" font-size="11">solidity, move, hooks</text>
  <text x="44" y="221" class="f-sans t-sec" font-size="11">protocol logic</text>

  <rect x="228" y="172" width="185" height="60" rx="8" class="bg-sec str" stroke-width="0.5"/>
  <text x="240" y="191" class="f-sans t-pri" font-size="12" font-weight="500">relayer systems</text>
  <text x="240" y="207" class="f-sans t-sec" font-size="11">off-chain execution</text>
  <text x="240" y="221" class="f-sans t-sec" font-size="11">tx management</text>

  <rect x="424" y="172" width="185" height="60" rx="8" class="bg-sec str" stroke-width="0.5"/>
  <text x="436" y="191" class="f-sans t-pri" font-size="12" font-weight="500">backend infra</text>
  <text x="436" y="207" class="f-sans t-sec" font-size="11">node, postgres, docker</text>
  <text x="436" y="221" class="f-sans t-sec" font-size="11">AWS</text>

  <line x1="32" y1="248" x2="648" y2="248" class="str" stroke-width="0.5"/>

  <text x="32" y="268" class="f-mono t-ter" font-size="10" letter-spacing="0.08em">STACK</text>

  <rect x="32"  y="278" width="76" height="20" rx="4" class="tag-hi"/>
  <text x="70"  y="292" class="f-mono tag-hi-t" font-size="10" font-weight="500" text-anchor="middle">Solidity</text>

  <rect x="116" y="278" width="52" height="20" rx="4" class="tag-hi"/>
  <text x="142" y="292" class="f-mono tag-hi-t" font-size="10" font-weight="500" text-anchor="middle">Move</text>

  <rect x="176" y="278" width="88" height="20" rx="4" class="tag-hi"/>
  <text x="220" y="292" class="f-mono tag-hi-t" font-size="10" font-weight="500" text-anchor="middle">Uniswap v4</text>

  <rect x="272" y="278" width="76" height="20" rx="4" class="tag-bg str" stroke-width="0.5"/>
  <text x="310" y="292" class="f-mono t-sec" font-size="10" text-anchor="middle">TypeScript</text>

  <rect x="356" y="278" width="60" height="20" rx="4" class="tag-bg str" stroke-width="0.5"/>
  <text x="386" y="292" class="f-mono t-sec" font-size="10" text-anchor="middle">Node.js</text>

  <rect x="424" y="278" width="76" height="20" rx="4" class="tag-bg str" stroke-width="0.5"/>
  <text x="462" y="292" class="f-mono t-sec" font-size="10" text-anchor="middle">PostgreSQL</text>

  <rect x="508" y="278" width="56" height="20" rx="4" class="tag-bg str" stroke-width="0.5"/>
  <text x="536" y="292" class="f-mono t-sec" font-size="10" text-anchor="middle">Docker</text>

  <rect x="572" y="278" width="44" height="20" rx="4" class="tag-bg str" stroke-width="0.5"/>
  <text x="594" y="292" class="f-mono t-sec" font-size="10" text-anchor="middle">AWS</text>

  <text x="340" y="328" class="f-sans t-ter" font-size="11" text-anchor="middle" font-style="italic">most bugs i've fixed were never where we thought they'd be</text>
</svg>
